# Some parameters are shared among different steps, so we use YAML anchors and references to avoid duplication.
# Syntax : &anchor_name value  (define an anchor)
#          *anchor_name       (reference an anchor)

_shared:
  - &images_dir 'path/to/images'
  - &fits_dir 'path/to/fits'
  - &moon_registered_dir 'path/to/moon_registered'
  - &sun_registered_dir 'path/to/sun_registered'
  - &moon_stacks_dir 'path/to/moon_stacks'
  - &sun_stacks_dir 'path/to/sun_stacks'
  - &moon_hdr_dir 'path/to/moon_hdr'
  - &sun_hdr_dir 'path/to/sun_hdr'
  - &merged_hdr_dir 'path/to/merged_hdr'
  - &group_keywords ["EXPTIME"]
  - &image_scale 1.00

conversion:
  images_dir: *images_dir
  fits_dir: *fits_dir
  flat_path: 'path/to/flats' # directory, master file, or null
  bias_path: 'path/to/bias'  # directory, master file, or null
  dark_path: 'path/to/dark'  # directory, master file, or null
  debayer_algorithm: 'menon' # or 'malvar', 'bilinear'
  calibration_outlier_threshold: 3.0

registration:
  fits_dir: *fits_dir
  ref_filename: 'path/to/reference_image.fits'    # or null to auto-select
  anchor_filenames: ['path/to/anchor_image.fits'] # or null to auto-select
  moon_registered_dir: *moon_registered_dir
  sun_registered_dir: *sun_registered_dir
  group_keywords: *group_keywords
  image_scale: *image_scale
  clipped_factor: 1.3
  edge_factor: 1.0
  sigma_high_pass_tangential: 4.0
  max_iter: 10
  error_overlay_opacity: 0.75

moon_integration:
  registered_dir: *moon_registered_dir
  stacks_dir: *moon_stacks_dir
  group_keywords: *group_keywords
  outlier_threshold: 3

sun_integration:
  registered_dir: *sun_registered_dir
  stacks_dir: *sun_stacks_dir
  group_keywords: *group_keywords
  outlier_threshold: 3
  moon_rejection: true
  extra_radius_pixels: 2
  smoothness: 10.0

moon_hdr_composition:
  moon_stacks_dir: *moon_stacks_dir
  moon_hdr_dir: *moon_hdr_dir
  group_keywords: *group_keywords
  low_clipping_threshold: 0.005
  low_smoothness: 0.001
  high_clipping_threshold: 0.1 # if exptimes[i+1]/exptimes[i] = k, then we should have high/low << k
  high_smoothness: 0.01

sun_hdr_composition:
  sun_stacks_dir: *sun_stacks_dir
  sun_hdr_dir: *sun_hdr_dir
  moon_registered_dir: *moon_registered_dir
  group_keywords: *group_keywords
  image_scale: *image_scale
  extra_radius_pixels: 10
  low_clipping_threshold: 0.005
  low_smoothness: 0.001
  high_clipping_threshold: 0.1 # if exptimes[i+1]/exptimes[i] = k, then we should have high/low << k
  high_smoothness: 0.01

merge_sun_moon:
  sun_hdr_dir: *sun_hdr_dir
  moon_hdr_dir: *moon_hdr_dir
  merged_hdr_dir: *merged_hdr_dir
  sigma: 2
  moon_threshold: 0.002